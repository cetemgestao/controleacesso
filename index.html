<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - Reserva por Turnos</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.8/index.global.min.js"></script>
    <style>
        :root { --azul: #005696; --vermelho: #ed1c24; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 800px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: var(--azul); color: white; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        #calendar { margin-top: 20px; height: 450px; background: #fff; }
        .fc-resource-area { width: 100px !important; font-weight: bold; color: var(--azul); }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/8c/SENAI_Logo.png" style="width:140px;">
    <h3 id="txt-sala" style="color:var(--vermelho)"></h3>

    <div id="tela-login">
        <input type="text" id="mat-login" placeholder="Sua Matrícula">
        <button onclick="entrar()">LIBERAR ACESSO</button>
        <button style="background:#6c757d; margin-top:10px;" onclick="abrirReserva()">VER AGENDA / RESERVAR</button>
    </div>

    <div id="tela-reserva" class="hidden">
        <div style="display: flex; gap: 10px;">
            <input type="text" id="res-mat" placeholder="Matrícula" oninput="buscarNome()">
            <input type="text" id="res-nome" placeholder="Nome" style="background:#eee" readonly>
        </div>
        <select id="res-sala-sel" onchange="carregarAgenda()"></select>
        
        <div id="calendar"></div>
        
        <p style="font-size:12px; color:#555;">Clique nos espaços brancos para selecionar o turno e o dia.</p>
        <button onclick="enviarReservas()">CONFIRMAR AGENDAMENTOS SELECIONADOS</button>
        <button style="background:#777" onclick="location.reload()">VOLTAR</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzMYdFmqmiO-pxj1LITaTtJM3XfI8i-D46YQ5WzSyiFrFwbeQkSKnIqttrkCiJ4fXs9/exec";
    const salaURL = new URLSearchParams(window.location.search).get('sala') || "B5";
    document.getElementById('txt-sala').innerText = "Lab: " + salaURL;
    
    let calendar;
    let selecionados = [];

    function buscarNome() {
        const mat = document.getElementById('res-mat').value;
        if(mat.length < 3) return;
        fetch(`${API_URL}?acao=getUsuario&matricula=${mat}`).then(r => r.json()).then(res => {
            document.getElementById('res-nome').value = res.nome || "Não cadastrado";
        });
    }

    function abrirReserva() {
        document.getElementById('tela-login').classList.add('hidden');
        document.getElementById('tela-reserva').classList.remove('hidden');
        
        fetch(`${API_URL}?acao=getSalas`).then(r => r.json()).then(res => {
            const sel = document.getElementById('res-sala-sel');
            sel.innerHTML = '<option value="">Selecione a Sala</option>';
            res.slice(1).forEach(s => sel.innerHTML += `<option value="${s[0]}">${s[1]}</option>`);
        });

        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            schedulerLicenseKey: 'CC-Attribution-NonCommercial-NoDerivatives',
            initialView: 'resourceTimelineWeek', // Visão de Linha do Tempo Semanal
            locale: 'pt-br',
            resources: [
                { id: 'manha', title: 'MANHÃ' },
                { id: 'tarde', title: 'TARDE' },
                { id: 'noite', title: 'NOITE' }
            ],
            dateClick: function(info) {
                const dataStr = info.dateStr.split("T")[0]; // YYYY-MM-DD
                const tId = info.resource.id;
                const idUnico = dataStr + tId;

                const index = selecionados.findIndex(s => s.id === idUnico);
                if (index > -1) {
                    selecionados.splice(index, 1);
                    info.dayEl.style.backgroundColor = '';
                } else {
                    const [y, m, d] = dataStr.split("-");
                    selecionados.push({id: idUnico, data: `${d}/${m}/${y}`, turnoId: tId});
                    info.dayEl.style.backgroundColor = '#d1e7ff';
                }
            }
        });
        calendar.render();
    }

    function carregarAgenda() {
        const sala = document.getElementById('res-sala-sel').value;
        if(!sala) return;
        selecionados = [];
        calendar.removeAllEvents();
        Swal.fire({title: 'Buscando agenda...', didOpen: () => Swal.showLoading()});
        fetch(`${API_URL}?acao=getAgenda&sala=${sala}`).then(r => r.json()).then(ev => {
            calendar.addEventSource(ev);
            Swal.close();
        });
    }

    function enviarReservas() {
        const mat = document.getElementById('res-mat').value;
        const nome = document.getElementById('res-nome').value;
        const sala = document.getElementById('res-sala-sel').value;
        
        if(selecionados.length === 0 || !mat || !sala) return Swal.fire('Erro', 'Selecione os turnos no calendário!', 'warning');

        Swal.fire({title: 'Gravando...', didOpen: () => Swal.showLoading()});
        fetch(`${API_URL}?acao=reservar&sala=${sala}&matricula=${mat}&nome=${nome}&reservas=${JSON.stringify(selecionados)}`)
        .then(() => {
            Swal.fire('Sucesso!', 'Agendamentos confirmados.', 'success').then(() => location.reload());
        });
    }
</script>
</body>
</html>
