<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Chaves SENAI</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 400px; background: white; padding: 20px; border-radius: 15px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-azul { background: #1a73e8; color: white; }
        .btn-verde { background: #34a853; color: white; }
        .btn-vermelho { background: #ea4335; color: white; }
        .escondido { display: none; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div id="statusSala" style="font-weight: bold; color: #555; margin-bottom: 10px;"></div>

    <div id="telaLogin" class="escondido">
        <h2>Identificação</h2>
        <input type="text" id="inputMatricula" placeholder="Digite sua Matrícula">
        <button class="btn btn-azul" onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="telaCarregando" class="escondido"><h2>Aguarde...</h2><p>Consultando reservas...</p></div>

    <div id="telaUso" class="escondido">
        <p>Olá, <span id="nomeInstrutor" style="font-weight:bold; color:#1a73e8;"></span></p>
        <h2 style="color: #34a853;">Acesso Liberado!</h2>
        <p>A sua entrada foi registada.</p>
    </div>

    <div id="telaDevolucao" class="escondido">
        <h2>Devolver Chave</h2>
        <p>Confirmas que todos os equipamentos estão na sala?</p>
        <button class="btn btn-verde" onclick="enviarDevolucao('Tudo OK')">SIM, está tudo OK</button>
        <button class="btn btn-vermelho" onclick="mostrarRelato()">NÃO, algo aconteceu</button>
    </div>

    <div id="telaRelato" class="escondido">
        <textarea id="textoRelato" rows="4" placeholder="Descreva o problema..."></textarea>
        <button class="btn btn-vermelho" onclick="enviarRelato()">Enviar e Finalizar</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbzMYdFmqmiO-pxj1LITaTtJM3XfI8i-D46YQ5WzSyiFrFwbeQkSKnIqttrkCiJ4fXs9/exec"; 
    const urlParams = new URLSearchParams(window.location.search);
    const salaAtual = urlParams.get('sala') || "Desconhecida";

    function mostrarTela(id) {
        ['telaLogin','telaCarregando','telaUso','telaDevolucao','telaRelato'].forEach(t => document.getElementById(t).classList.add('escondido'));
        document.getElementById(id).classList.remove('escondido');
    }

    window.onload = function() {
        document.getElementById("statusSala").innerText = "Laboratório: " + salaAtual;
        let m = localStorage.getItem("matLab");
        if (!m) mostrarTela('telaLogin');
        else if (localStorage.getItem("status") === "em_uso") mostrarTela('telaDevolucao');
        else verificar(m);
    };

    function fazerLogin() {
        let m = document.getElementById("inputMatricula").value;
        if (!m) return alert("Digite a matrícula");
        localStorage.setItem("matLab", m);
        verificar(m);
    }

    function verificar(m) {
        mostrarTela('telaCarregando');
        fetch(`${URL_API}?acao=verificar&matricula=${m}&sala=${salaAtual}`)
            .then(r => r.json()).then(d => {
                if (d.status === "sucesso") {
                    localStorage.setItem("status", "em_uso");
                    localStorage.setItem("nome", d.nome);
                    document.getElementById("nomeInstrutor").innerText = d.nome;
                    mostrarTela('telaUso');
                } else {
                    alert(d.msg || "Sem reserva.");
                    localStorage.clear();
                    location.reload();
                }
            });
    }

    function mostrarRelato() { mostrarTela('telaRelato'); }
    function enviarRelato() { enviarDevolucao(document.getElementById("textoRelato").value); }

    function enviarDevolucao(rel) {
        mostrarTela('telaCarregando');
        let m = localStorage.getItem("matLab");
        fetch(`${URL_API}?acao=devolver&matricula=${m}&relato=${encodeURIComponent(rel)}`)
            .then(() => { localStorage.clear(); location.reload(); });
    }
</script>
</body>
</html>
