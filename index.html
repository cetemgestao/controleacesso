<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - Reserva por Turno</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        :root { --azul: #005696; --vermelho: #ed1c24; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 600px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--azul); color: white; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        #calendar { margin-top: 15px; height: 500px; }
        /* Esconde horas desnecessárias para focar nos turnos */
        .fc-timegrid-slot { height: 50px !important; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/8c/SENAI_Logo.png" style="width:120px;">
    <h3 id="txt-sala" style="color:var(--vermelho)"></h3>

    <div id="tela-login">
        <input type="text" id="mat-login" placeholder="Matrícula">
        <button onclick="entrar()">ENTRAR NO LAB</button>
        <button style="background:#6c757d; margin-top:10px;" onclick="abrirReserva()">VER AGENDA / RESERVAR</button>
    </div>

    <div id="tela-reserva" class="hidden">
        <input type="text" id="res-mat" placeholder="Sua Matrícula" oninput="buscarNome()">
        <input type="text" id="res-nome" placeholder="Nome" style="background:#f9f9f9" readonly>
        <select id="res-sala-sel" onchange="carregarCalendario()"></select>
        
        <div id="calendar"></div>
        
        <p style="font-size:11px; color:#666;">Clique nos espaços vazios (Manhã, Tarde ou Noite) para agendar.</p>
        <button onclick="salvarReservas()">CONFIRMAR AGENDAMENTOS SELECIONADOS</button>
        <button style="background:#777" onclick="location.reload()">VOLTAR</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzMYdFmqmiO-pxj1LITaTtJM3XfI8i-D46YQ5WzSyiFrFwbeQkSKnIqttrkCiJ4fXs9/exec";
    const salaURL = new URLSearchParams(window.location.search).get('sala') || "B5";
    document.getElementById('txt-sala').innerText = "Lab: " + salaURL;
    
    let calendar;
    let selecoes = []; // Guardará {data, turno}

    function buscarNome() {
        const mat = document.getElementById('res-mat').value;
        if(mat.length < 3) return;
        fetch(`${API_URL}?acao=getUsuario&matricula=${mat}`).then(r => r.json()).then(res => {
            document.getElementById('res-nome').value = res.nome || "Não cadastrado";
        });
    }

    function abrirReserva() {
        document.getElementById('tela-login').classList.add('hidden');
        document.getElementById('tela-reserva').classList.remove('hidden');
        
        fetch(`${API_URL}?acao=getSalas`).then(r => r.json()).then(res => {
            const sel = document.getElementById('res-sala-sel');
            sel.innerHTML = '<option value="">Selecione a Sala</option>';
            res.slice(1).forEach(s => sel.innerHTML += `<option value="${s[0]}">${s[1]}</option>`);
        });

        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek', // Mostra a semana com horas
            locale: 'pt-br',
            slotMinTime: '08:00:00',
            slotMaxTime: '22:00:00',
            allDaySlot: false,
            headerToolbar: { left: 'prev,next', center: 'title', right: 'timeGridWeek,dayGridMonth' },
            dateClick: function(info) {
                const dataPlena = info.date;
                const hora = dataPlena.getHours();
                let turno = "";
                
                if (hora >= 8 && hora < 12) turno = "Manhã";
                else if (hora >= 13 && hora < 18) turno = "Tarde";
                else if (hora >= 18) turno = "Noite";
                
                if(!turno) return;

                const dataFormatada = dataPlena.toLocaleDateString('pt-BR');
                const idSelecao = dataFormatada + turno;

                const index = selecoes.findIndex(s => s.id === idSelecao);
                if (index > -1) {
                    selecoes.splice(index, 1);
                    info.dayEl.style.backgroundColor = '';
                } else {
                    selecoes.push({id: idSelecao, data: dataFormatada, turno: turno});
                    info.dayEl.style.backgroundColor = '#d1e7ff';
                }
            }
        });
        calendar.render();
    }

    function carregarCalendario() {
        const sala = document.getElementById('res-sala-sel').value;
        if(!sala) return;
        calendar.removeAllEvents();
        fetch(`${API_URL}?acao=getAgenda&sala=${sala}`).then(r => r.json()).then(ev => {
            calendar.addEventSource(ev);
        });
    }

    function salvarReservas() {
        const mat = document.getElementById('res-mat').value;
        const nome = document.getElementById('res-nome').value;
        const sala = document.getElementById('res-sala-sel').value;
        
        if(selecoes.length === 0 || !mat || !sala) return alert("Selecione os turnos no calendário!");

        Swal.fire({title: 'Salvando...', didOpen: () => Swal.showLoading()});
        
        const url = `${API_URL}?acao=reservar&sala=${sala}&matricula=${mat}&nome=${nome}&reservas=${JSON.stringify(selecoes)}`;
        fetch(url).then(() => {
            Swal.fire('Sucesso!', 'Reservas confirmadas!', 'success').then(() => location.reload());
        });
    }
    
    // ... manter funções de entrar e sair ...
</script>
</body>
</html>
