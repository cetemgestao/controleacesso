<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENAI - Lab Control</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root { --azul: #005696; --vermelho: #ed1c24; --fundo: #f4f7f6; }
body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); padding: 10px; margin: 0; display: flex; justify-content: center; }
.card { background: white; padding: 20px; border-radius: 12px; max-width: 600px; width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
input, select, button, textarea { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; }
button { background: var(--azul); color: white; border: none; font-weight: bold; cursor: pointer; }
.hidden { display: none; }
.calendario-container { margin-top: 15px; overflow-x: auto; border: 1px solid #ddd; border-radius: 8px; }
.tabela-grade { width: 100%; border-collapse: collapse; }
.tabela-grade th, .tabela-grade td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 12px; }
.turno-label { font-weight: bold; background: #fafafa; color: var(--azul); }
.celula-ocupada { background: #ffebeb; color: var(--vermelho); font-weight: bold; }
.celula-livre { cursor: pointer; }
.celula-selecionada { background: #b3d4ff; font-weight: bold; }
</style>
</head>

<body>

<div class="card">

<h3 id="txt-sala">Central de Reservas</h3>

<!-- LOGIN -->
<div id="tela-login">
<input type="text" id="mat-login" placeholder="Sua Matrícula">
<input type="password" id="mat-pin" placeholder="Senha">
<button onclick="entrar()">ENTRAR NO LAB</button>
<button onclick="abrirReserva()">VER AGENDA / RESERVAR</button>
</div>

<!-- DEVOLUÇÃO -->
<div id="tela-devolucao" class="hidden">
<h2>Uso em andamento</h2>
<textarea id="relato" placeholder="Relato (opcional)"></textarea>
<button style="background:var(--vermelho)" onclick="sair()">DEVOLVER CHAVE</button>
</div>

<!-- RESERVA -->
<div id="tela-reserva" class="hidden">

<input type="text" id="res-mat" placeholder="Matrícula">
<input type="password" id="res-pin" placeholder="Senha">
<input type="text" id="res-nome" placeholder="Nome" readonly>

<select id="res-sala-sel" onchange="carregarAgenda()"></select>

<div class="calendario-container">
<table class="tabela-grade">
<thead id="grade-cabecalho"></thead>
<tbody id="grade-corpo"></tbody>
</table>
</div>

<button onclick="enviarReservas()">CONFIRMAR AGENDAMENTOS</button>
<button onclick="location.reload()">VOLTAR</button>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzMYdFmqmiO-pxj1LITaTtJM3XfI8i-D46YQ5WzSyiFrFwbeQkSKnIqttrkCiJ4fXs9/exec";

let agendaAtual = [];
let mapaAgenda = {};
let selecionados = [];
let dataInicioSemana = new Date();
let carregandoAgenda = false;

// =========================
// INDEXAÇÃO
// =========================
function indexarAgenda(){
    mapaAgenda = {};
    agendaAtual.forEach(r=>{
        mapaAgenda[`${r.data}|${r.turno}`] = r;
    });
}

// =========================
// LOGIN
// =========================
function entrar(){
    const mat = document.getElementById('mat-login').value;
    const pin = document.getElementById('mat-pin').value;

    if(!mat || !pin) return Swal.fire('Erro','Preencha matrícula e senha');

    fetch(`${API_URL}?acao=verificar&matricula=${mat}&pin=${pin}&sala=B5`)
    .then(r=>r.json())
    .then(res=>{
        if(res.status === "sucesso"){
            mostrar('tela-devolucao');
        } else {
            Swal.fire('Erro',res.msg);
        }
    });
}

// =========================
// RESERVA
// =========================
function abrirReserva(){
    mostrar('tela-reserva');
}

function carregarAgenda(){
    if(carregandoAgenda) return;
    carregandoAgenda = true;

    const sala = document.getElementById('res-sala-sel').value || "B5";

    fetch(`${API_URL}?acao=getAgenda&sala=${sala}`)
    .then(r=>r.json())
    .then(res=>{
        agendaAtual = res;
        indexarAgenda();
        renderizar();
    })
    .finally(()=>carregandoAgenda=false);
}

function renderizar(){
    let html = "";
    const turnos = ["Manhã","Tarde","Noite"];

    turnos.forEach(t=>{
        html += `<tr><td class="turno-label">${t}</td>`;

        for(let i=1;i<=7;i++){
            const data = "01/01/2026";
            const r = mapaAgenda[`${data}|${t.toUpperCase()}`];

            if(r){
                html += `<td class="celula-ocupada">X</td>`;
            } else {
                html += `<td class="celula-livre" onclick="selecionar('${data}|${t}')"></td>`;
            }
        }

        html += "</tr>";
    });

    document.getElementById('grade-corpo').innerHTML = html;
}

function selecionar(id){
    if(selecionados.includes(id)){
        selecionados = selecionados.filter(i=>i!==id);
    } else {
        selecionados.push(id);
    }
    renderizar();
}

function enviarReservas(){
    const mat = document.getElementById('res-mat').value;
    const pin = document.getElementById('res-pin').value;
    const sala = document.getElementById('res-sala-sel').value || "B5";

    if(!pin) return Swal.fire('Erro','Digite a senha');

    const dados = selecionados.map(s=>{
        const [data,turno] = s.split("|");
        return {data,turno};
    });

    fetch(`${API_URL}?acao=reservar&matricula=${mat}&pin=${pin}&sala=${sala}&reservas=${encodeURIComponent(JSON.stringify(dados))}`)
    .then(r=>r.json())
    .then(res=>{
        if(res.status==="sucesso"){
            Swal.fire('Sucesso');
            selecionados = [];
            carregarAgenda();
        } else {
            Swal.fire('Erro',res.msg);
        }
    });
}

// =========================
// SAÍDA (B5 OBRIGATÓRIO)
// =========================
function sair(){
    Swal.fire({
        title:'Confirmação obrigatória',
        text:'Você conferiu todos os equipamentos da sala?',
        showCancelButton:true
    }).then(r=>{
        if(r.isConfirmed){
            fetch(`${API_URL}?acao=devolver&matricula=${document.getElementById('mat-login').value}&sala=B5`)
            .then(()=>location.reload());
        }
    });
}

// =========================
// UI
// =========================
function mostrar(id){
    document.querySelectorAll('.card > div').forEach(d=>d.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

</script>

</body>
</html>
