<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - Lab Control</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --azul: #005696; --vermelho: #ed1c24; --fundo: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); padding: 10px; margin: 0; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 600px; width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        input, select, button, textarea { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; }
        button { background: var(--azul); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .hidden { display: none; }
        .nav-semana { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-weight: bold; color: var(--azul); }
    </style>
</head>
<body>

<div class="card">
    <img src="SUA-LOGO-AQUI" style="width:120px; margin-bottom: 10px;">
    <h3 id="txt-sala" style="color:var(--vermelho); margin: 10px 0;"></h3>

    <div id="tela-login">
        <input type="text" id="mat-login" placeholder="Sua Matrícula">
        <input type="password" id="senha-login" placeholder="Sua Senha">
        <button onclick="entrar()">ENTRAR NO LAB</button>
        <button style="background:#6c757d; margin-top:10px;" onclick="mostrar('tela-reserva')">RESERVAR</button>
    </div>

    <div id="tela-devolucao" class="hidden">
        <h2 style="color:var(--azul)">Sessão Ativa</h2>
        <button style="background:var(--vermelho); padding: 20px;" onclick="iniciarDevolucao()">🔒 DEVOLVER CHAVE</button>
    </div>
</div>

<script>
    const API_URL = "SUA-URL-DO-SCRIPT-AQUI"; // Certifique-se de atualizar esta URL
    const params = new URLSearchParams(window.location.search);
    const salaURL = params.get('sala');
    if (salaURL) document.getElementById('txt-sala').innerText = "Laboratório: " + salaURL;

    function mostrar(id) {
        document.querySelectorAll('.card > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function entrar() {
        const mat = document.getElementById('mat-login').value;
        Swal.fire({title: 'Validando...', didOpen: () => Swal.showLoading()});
        fetch(`${API_URL}?acao=verificar&matricula=${mat}&sala=${salaURL}`).then(r => r.json()).then(res => {
            if(res.status === "sucesso") mostrar('tela-devolucao'), Swal.close();
            else Swal.fire('Erro', res.msg, 'error');
        });
    }

    function iniciarDevolucao() {
        Swal.fire({
            title: 'Equipamentos OK?',
            showCancelButton: true,
            confirmButtonText: 'SIM',
            cancelButtonText: 'NÃO'
        }).then((result) => {
            if (result.isConfirmed) processarSaida("Tudo OK", "");
            else {
                Swal.fire({
                    title: 'Relatar Avaria',
                    html: '<textarea id="txt-avaria" class="swal2-textarea"></textarea><input type="file" id="f-foto" accept="image/*" capture="camera">',
                    preConfirm: () => ({ relato: document.getElementById('txt-avaria').value, foto: document.getElementById('f-foto').files[0] })
                }).then(res => {
                    if (res.isConfirmed) {
                        if (res.value.foto) {
                            const reader = new FileReader();
                            reader.onload = (e) => processarSaida(res.value.relato, e.target.result);
                            reader.readAsDataURL(res.value.foto);
                        } else processarSaida(res.value.relato, "");
                    }
                });
            }
        });
    }

    async function processarSaida(relato, fotoBase64) {
        const mat = document.getElementById('mat-login').value;
        Swal.fire({title: 'Gravando...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
        
        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', // Necessário para evitar erro de CORS do Google ao enviar muito dado
                body: JSON.stringify({
                    acao: 'devolver',
                    matricula: mat,
                    sala: salaURL,
                    relato: relato,
                    fotoBase64: fotoBase64
                })
            });
            Swal.fire('Sucesso', 'Saída registrada!', 'success').then(() => location.reload());
        } catch(e) {
            Swal.fire('Erro', 'Tente novamente.', 'error');
        }
    }
</script>
</body>
</html>
