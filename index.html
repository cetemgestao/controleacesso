<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Controle de Laboratórios - SENAI</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --azul-senai: #005696; --vermelho: #ed1c24; --cinza: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--cinza); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        img.logo { width: 180px; margin-bottom: 20px; }
        h2 { color: var(--azul-senai); margin-bottom: 5px; }
        p.sala-info { font-weight: bold; color: var(--vermelho); margin-bottom: 20px; }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background-color: var(--azul-senai); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #003d6b; }
        button.btn-reserva { background-color: white; color: var(--azul-senai); border: 2px solid var(--azul-senai); margin-top: 15px; }
        
        .hidden { display: none; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/8c/SENAI_Logo.png" alt="Logo SENAI" class="logo">
        
        <div id="tela-login">
            <h2>Acesso ao Laboratório</h2>
            <p id="info-sala" class="sala-info">Carregando sala...</p>
            <input type="text" id="matricula" placeholder="Digite sua Matrícula">
            <button onclick="verificarAcesso()">LIBERAR ENTRADA</button>
            <button class="btn-reserva" onclick="mostrarTelaReserva()">FAZER NOVA RESERVA</button>
        </div>

        <div id="tela-reserva" class="hidden">
            <h2>Nova Reserva</h2>
            <input type="text" id="res-nome" placeholder="Seu Nome Completo">
            <input type="text" id="res-matricula" placeholder="Sua Matrícula">
            <select id="res-sala">
                <option value="">Selecione a Sala</option>
                <option value="B5">B5 - Informática</option>
                <option value="C7">C7 - Comandos</option>
                <option value="SEP">SEP - Oficina</option>
            </select>
            <input type="date" id="res-data">
            <select id="res-turno">
                <option value="Manhã">Manhã</option>
                <option value="Tarde">Tarde</option>
                <option value="Noite">Noite</option>
            </select>
            <button onclick="salvarReserva()">CONFIRMAR RESERVA</button>
            <button class="btn-reserva" onclick="voltarLogin()">VOLTAR</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO: COLOQUE O SEU LINK DA API AQUI
        const API_URL = "https://script.google.com/macros/s/AKfycbzMYdFmqmiO-pxj1LITaTtJM3XfI8i-D46YQ5WzSyiFrFwbeQkSKnIqttrkCiJ4fXs9/exec";

        // Pega a sala pela URL (ex: ?sala=B5)
        const params = new URLSearchParams(window.location.search);
        const salaAtual = params.get('sala') || "Não identificada";
        document.getElementById('info-sala').innerText = "Laboratório: " + salaAtual;

        function verificarAcesso() {
            const mat = document.getElementById('matricula').value;
            if(!mat) return alert("Digite a matrícula!");

            Swal.fire({ title: 'Verificando...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            fetch(`${API_URL}?acao=verificar&matricula=${mat}&sala=${salaAtual}`)
                .then(r => r.json())
                .then(res => {
                    if(res.status === "sucesso") {
                        Swal.fire('Acesso Liberado!', `Bem-vindo, ${res.nome}`, 'success');
                    } else {
                        Swal.fire('Acesso Negado', res.msg, 'error');
                    }
                });
        }

        function mostrarTelaReserva() {
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('tela-reserva').classList.remove('hidden');
        }

        function voltarLogin() {
            document.getElementById('tela-reserva').classList.add('hidden');
            document.getElementById('tela-login').classList.remove('hidden');
        }

        function salvarReserva() {
            const nome = document.getElementById('res-nome').value;
            const mat = document.getElementById('res-matricula').value;
            const sala = document.getElementById('res-sala').value;
            const dataRaw = document.getElementById('res-data').value; // yyyy-mm-dd
            const turno = document.getElementById('res-turno').value;

            if(!nome || !mat || !sala || !dataRaw) return alert("Preencha tudo!");

            // Converte data para DD/MM/YYYY para o Google Sheets
            const dataSplit = dataRaw.split("-");
            const dataFormatada = `${dataSplit[2]}/${dataSplit[1]}/${dataSplit[0]}`;

            Swal.fire({ title: 'Salvando reserva...', didOpen: () => { Swal.showLoading() } });

            fetch(`${API_URL}?acao=reservar&nome=${nome}&matricula=${mat}&sala=${sala}&data=${dataFormatada}&turno=${turno}`)
                .then(r => r.json())
                .then(res => {
                    if(res.status === "sucesso") {
                        Swal.fire('Sucesso!', 'Reserva gravada no sistema.', 'success').then(() => voltarLogin());
                    } else {
                        Swal.fire('Erro', 'Não foi possível salvar.', 'error');
                    }
                });
        }
    </script>
</body>
</html>
